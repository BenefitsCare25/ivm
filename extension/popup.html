<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #0f172a;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f8fafc;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 9999px;
      background: #1e3a5f;
      color: #93c5fd;
    }
    .status {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.ready {
      background: #0f2e1e;
      border: 1px solid #166534;
      color: #86efac;
    }
    .status.idle {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .status.error {
      background: #2e0f0f;
      border: 1px solid #991b1b;
      color: #fca5a5;
    }
    .info {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 12px;
    }
    .info .label { color: #94a3b8; }
    .info .value {
      word-break: break-all;
      color: #cbd5e1;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.primary {
      background: #2563eb;
      color: white;
    }
    button.primary:hover { background: #1d4ed8; }
    button.primary:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>IVM Auto-Fill</h1>
    <span class="badge">v1.0</span>
  </div>

  <div id="status" class="status idle">
    Waiting for fill data from IVM...
  </div>

  <div id="info" class="info" style="display:none;">
    <div><span class="label">Target:</span> <span id="targetUrl" class="value"></span></div>
    <div><span class="label">Session:</span> <span id="sessionId" class="value"></span></div>
    <div><span class="label">Time:</span> <span id="timestamp" class="value"></span></div>
  </div>

  <button id="refillBtn" class="primary" disabled>Re-run Fill on Active Tab</button>

  <script src="popup.js"></script>
</body>
</html>
